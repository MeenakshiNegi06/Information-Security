<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Project</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .form-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        #message { color: red; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Login Form</h3>
    <input type="text" placeholder="Name" id="userName">
    <input type="email" placeholder="Email" id="userEmail">
    <input type="password" placeholder="Enter Password" id="userPass">
    
    <button onclick="checkPassword()">Login</button>
    
    <p id="message"></p>
</div>

<script src="password.js"></script>

</body>
</html>
